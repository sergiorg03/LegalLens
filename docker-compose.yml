services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: legallens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      API_URL: http://ai_engine:8001/analizar
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: [ "python", "backend/manage.py", "runserver", "0.0.0.0:8000" ]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ai_engine:
    build:
      context: .
      dockerfile: ai_engine/Dockerfile
    ports:
      - "8002:8001"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      OLLAMA_URL: http://ollama:11434/api/chat
    depends_on:
      - ollama
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001" ]
    restart: unless-stopped

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: legallens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legallens"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      ai_engine:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
